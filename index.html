<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- 🐰 ======= NAVBAR ======= 🐰 -->
    <nav>
      <div class="logo">
        <img src="public/logo.png" />
      </div>

      <div class="navs">
        <ul>
          <li>About</li>
          <li>Technology</li>
          <li>Sustainability</li>
          <li>Models</li>
          <li>Explore</li>
        </ul>
      </div>
    </nav>

    <!-- 🐰 ======= HERO SECTION ======= 🐰 -->
    <section class="hero">
      <div class="hero-image">
        <img src="public/hero.png" />
        <div class="hero-overlay"></div>
      </div>

      <div class="hero-content">
        <div class="left">
          <div class="top">
            <h1 class="hero-title">
              Driving <span>the</span> <br />
              Greener Future
            </h1>
            <p class="hero-sub">
              Meet BYD. Electric vehicles designed for sustainability, comfort,
              and a better tomorrow.
            </p>
          </div>

          <div class="bottom">
            <div class="play-btn"></div>
            <div class="overlay"></div>
            <video src="public/video.mp4"></video>
          </div>
        </div>

        <div class="right">
          <span>Discover More</span>
        </div>
      </div>
    </section>

	<section style="height: 100vh;">

	</section>
  </body>
</html>
